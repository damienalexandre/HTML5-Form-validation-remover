<!doctype html>
<meta charset="utf-8">
<title>HTML5 Form Validation Remover - Options</title>

<form id="options-form" class="detail-view-container">
	<h1>HTML5 Form Validation Remover</h1>
	<p>Click the extension icon to remove HTML5 form validation on the current page.</p>
	<p>Configure which methods are used below:</p>
	
	<h3>Master Switch</h3>
	<div class="option-group">
		<label class="toggle-option">
			<span>Enable extension globally</span>
			<p class="description">When disabled, clicking the icon will do nothing.</p>
			<input type="checkbox" name="enabled">
		</label>
	</div>

	<h3>Validation Removal Methods</h3>
	<p>These methods are applied when you click the extension icon on a page:</p>
	
	<div class="option-group">
		<label class="toggle-option">
			<span>Add novalidate attribute to forms</span>
			<p class="description">Prevents HTML5 validation by adding the novalidate attribute to all forms on the page.</p>
			<input type="checkbox" name="addNovalidateAttribute">
		</label>
	</div>

	<div class="option-group">
		<label class="toggle-option">
			<span>Prevent invalid event</span>
			<p class="description">Prevents the browser from showing validation messages when form fields are invalid.</p>
			<input type="checkbox" name="preventInvalidEvent">
		</label>
	</div>
</form>

<script src="options.js" type="module"></script>
